<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Worm Aiva</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --red: #e8002a;
    --red-bright: #ff1744;
    --red-dim: #a0001e;
    --red-glow: rgba(232,0,42,0.18);
    --red-glow2: rgba(255,23,68,0.08);
    --bg: #0a0608;
    --bg2: #120a0c;
    --bg3: #1a0d10;
    --surface: #1c0e12;
    --surface2: #241318;
    --surface3: #2e181d;
    --border: rgba(232,0,42,0.15);
    --border-bright: rgba(232,0,42,0.35);
    --text: #f0dde0;
    --text-dim: #9a7880;
    --text-faint: #5a3840;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
  }

  /* Sidebar */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
    z-index: 100;
  }

  .sidebar-header {
    padding: 20px 16px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand-small {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .brand-small img {
    width: 28px; height: 28px;
    border-radius: 7px;
    border: 1px solid var(--border-bright);
  }

  .brand-small span {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--red-bright);
    letter-spacing: 1px;
  }

  .new-chat-btn {
    background: var(--red-glow);
    border: 1px solid var(--border-bright);
    color: var(--red-bright);
    padding: 7px 13px;
    border-radius: 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .new-chat-btn:hover {
    background: var(--red);
    color: #fff;
    box-shadow: 0 0 14px var(--red-glow);
  }

  .history-label {
    padding: 14px 16px 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text-faint);
    text-transform: uppercase;
  }

  #history-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 8px;
  }

  #history-list::-webkit-scrollbar { width: 3px; }
  #history-list::-webkit-scrollbar-thumb { background: var(--red-dim); border-radius: 2px; }

  .hist-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 2px;
    transition: background 0.15s;
    group: true;
  }

  .hist-item:hover { background: var(--surface); }
  .hist-item.active { background: var(--surface2); border: 1px solid var(--border); }

  .hist-title {
    font-size: 13px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .hist-item.active .hist-title { color: var(--text); }

  .hist-del {
    background: none;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    line-height: 1;
  }

  .hist-item:hover .hist-del { opacity: 1; }
  .hist-del:hover { color: var(--red-bright); }

  .clear-all-btn {
    margin: 0 8px 12px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-faint);
    padding: 8px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
  }

  .clear-all-btn:hover {
    border-color: var(--red-dim);
    color: var(--red-bright);
    background: var(--red-glow2);
  }

  /* Main */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Top bar */
  #topbar {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg2);
    position: relative;
    z-index: 10;
  }

  #menu-toggle {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    font-size: 18px;
    line-height: 1;
    transition: color 0.2s;
    display: none;
  }

  #menu-toggle:hover { color: var(--red-bright); }

  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  .topbar-brand img {
    width: 32px; height: 32px;
    border-radius: 9px;
    border: 1.5px solid var(--red);
    box-shadow: 0 0 14px var(--red-glow);
  }

  .topbar-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--red-bright);
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(255,23,68,0.4);
  }

  .model-badge {
    font-size: 11px;
    color: var(--text-faint);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Chat area */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  #chat-area::-webkit-scrollbar { width: 4px; }
  #chat-area::-webkit-scrollbar-thumb { background: var(--red-dim); border-radius: 2px; }

  /* Welcome screen */
  #welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 40px 20px;
  }

  .welcome-logo {
    width: 90px; height: 90px;
    border-radius: 22px;
    border: 2px solid var(--red);
    box-shadow: 0 0 40px rgba(232,0,42,0.3), 0 0 80px rgba(232,0,42,0.12);
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 40px rgba(232,0,42,0.3), 0 0 80px rgba(232,0,42,0.12); }
    50% { box-shadow: 0 0 60px rgba(255,23,68,0.5), 0 0 120px rgba(232,0,42,0.2); }
  }

  .welcome-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--red-bright);
    letter-spacing: 4px;
    text-shadow: 0 0 30px rgba(255,23,68,0.5);
    text-align: center;
  }

  .welcome-sub {
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    text-align: center;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 520px;
  }

  .sugg-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 9px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
  }

  .sugg-btn:hover {
    border-color: var(--red);
    color: var(--text);
    background: var(--red-glow);
    box-shadow: 0 0 10px var(--red-glow);
  }

  /* Messages */
  .msg {
    display: flex;
    gap: 12px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
    animation: fade-in 0.25s ease;
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 10px;
    flex-shrink: 0;
    overflow: hidden;
    border: 1.5px solid var(--border-bright);
    display: flex; align-items: center; justify-content: center;
  }

  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  .avatar-user {
    background: var(--red-dim);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: #fff;
  }

  .bubble {
    flex: 1;
    padding: 13px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  .msg.user .bubble {
    background: var(--surface2);
    border: 1px solid var(--border-bright);
    border-radius: 12px 4px 12px 12px;
    max-width: 70%;
  }

  .msg.ai .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px 12px 12px 12px;
  }

  /* Code block */
  .code-block-wrapper {
    margin: 12px 0;
    border: 1px solid var(--border-bright);
    border-radius: 10px;
    overflow: hidden;
    background: #0d0608;
  }

  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: var(--surface3);
    border-bottom: 1px solid var(--border);
  }

  .code-lang {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--red-bright);
    letter-spacing: 1px;
    font-weight: 500;
  }

  .code-actions {
    display: flex;
    gap: 6px;
  }

  .code-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
  }

  .code-btn:hover {
    border-color: var(--red);
    color: var(--red-bright);
    background: var(--red-glow2);
  }

  .code-btn.copied {
    border-color: #2ecc71;
    color: #2ecc71;
  }

  .code-content {
    padding: 14px 16px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: #e0c8cc;
    white-space: pre;
  }

  .code-content::-webkit-scrollbar { height: 4px; }
  .code-content::-webkit-scrollbar-thumb { background: var(--red-dim); border-radius: 2px; }

  /* Inline formatting */
  .bubble strong { color: var(--red-bright); font-weight: 700; }
  .bubble em { color: #d4a0a8; font-style: italic; }
  .bubble code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: var(--surface3);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 4px;
    color: var(--red-bright);
  }
  .bubble h1, .bubble h2, .bubble h3 {
    font-family: 'Rajdhani', sans-serif;
    color: var(--red-bright);
    margin: 14px 0 6px;
    letter-spacing: 0.5px;
  }
  .bubble h1 { font-size: 20px; }
  .bubble h2 { font-size: 17px; }
  .bubble h3 { font-size: 15px; }
  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol {
    padding-left: 20px;
    margin: 8px 0;
  }
  .bubble li { margin-bottom: 4px; }
  .bubble a { color: var(--red-bright); text-decoration: underline; text-underline-offset: 2px; }

  /* Thinking indicator */
  .thinking {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    font-size: 13px;
    font-style: italic;
    padding: 4px 0;
  }

  .dots {
    display: flex; gap: 4px;
  }

  .dots span {
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }

  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Input area */
  #input-area {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
    max-width: 820px;
    margin: 0 auto;
  }

  .input-wrapper:focus-within {
    border-color: var(--red);
    box-shadow: 0 0 20px var(--red-glow);
  }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 22px;
    max-height: 160px;
    line-height: 1.5;
  }

  #msg-input::placeholder { color: var(--text-faint); }

  #send-btn {
    background: var(--red);
    border: none;
    color: #fff;
    width: 36px; height: 36px;
    border-radius: 9px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  #send-btn:hover {
    background: var(--red-bright);
    box-shadow: 0 0 16px var(--red-glow);
  }

  #send-btn:disabled {
    background: var(--surface3);
    cursor: not-allowed;
    box-shadow: none;
  }

  #send-btn svg { width: 16px; height: 16px; }

  .input-footer {
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 8px;
    letter-spacing: 0.3px;
  }

  /* Overlay for mobile */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 90;
  }

  /* Responsive */
  @media (max-width: 700px) {
    #sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      transform: translateX(-100%);
    }

    #sidebar.open { transform: translateX(0); }
    #menu-toggle { display: block; }
    #overlay.show { display: block; }

    .welcome-name { font-size: 32px; }
    .welcome-logo { width: 70px; height: 70px; }
    #chat-area { padding: 16px 14px; }
    #input-area { padding: 12px 14px 16px; }
  }

  /* Scrollbar general */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--red-dim); border-radius: 2px; }
</style>
</head>
<body>

<!-- Sidebar overlay -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sidebar-header">
    <div class="brand-small">
      <img src="https://i.ibb.co.com/T5JkfpS/file-00000000329c71fa9276e0523e9d3280.png" alt="Worm Aiva" />
      <span>WORM AIVA</span>
    </div>
    <button class="new-chat-btn" onclick="newChat()">+ Baru</button>
  </div>
  <div class="history-label">Riwayat</div>
  <div id="history-list"></div>
  <button class="clear-all-btn" onclick="clearAllHistory()">Hapus Semua Riwayat</button>
</div>

<!-- Main -->
<div id="main">
  <div id="topbar">
    <button id="menu-toggle" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="topbar-brand">
      <img src="https://i.ibb.co.com/T5JkfpS/file-00000000329c71fa9276e0523e9d3280.png" alt="Worm Aiva" />
      <span class="topbar-title">WORM AIVA</span>
    </div>
    <span class="model-badge" id="model-display">Dolphin3.0-R1-Mistral-24B</span>
  </div>

  <div id="chat-area">
    <div id="welcome">
      <img class="welcome-logo" src="https://i.ibb.co.com/T5JkfpS/file-00000000329c71fa9276e0523e9d3280.png" alt="Worm Aiva" />
      <div class="welcome-name">WORM AIVA</div>
      <div class="welcome-sub">Tanyakan apa saja, saya siap membantu sepenuhnya.</div>
      <div class="suggestions">
        <button class="sugg-btn" onclick="useSuggestion('Apa itu AI?')">Apa itu AI?</button>
        <button class="sugg-btn" onclick="useSuggestion('Bantu saya coding Python')">Bantu coding Python</button>
        <button class="sugg-btn" onclick="useSuggestion('Tulis email profesional')">Tulis email</button>
        <button class="sugg-btn" onclick="useSuggestion('Jelaskan machine learning')">Machine learning</button>
        <button class="sugg-btn" onclick="useSuggestion('Buat fungsi sorting di JavaScript')">Buat fungsi sort JS</button>
        <button class="sugg-btn" onclick="useSuggestion('Jelaskan cara kerja neural network secara mendalam')">Neural network</button>
      </div>
    </div>
  </div>

  <div id="input-area">
    <div class="input-wrapper">
      <textarea id="msg-input" placeholder="Pesan ke Worm Aiva..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-footer" id="footer-info">Model aktif: Dolphin3.0-R1-Mistral-24B</div>
  </div>
</div>

<script>
// ===== CONFIG =====
const FEATHERLESS_API = "https://api.featherless.ai/v1/chat/completions";
const API_KEY = "rc_f62e04e810ffed11a9e06b059017a74290bc04362e151b3509615c12c49e11b7"; // Ganti dengan API key Featherless kamu

const MODELS = [
  "Dolphin3.0-R1-Mistral-24B",
  "cognitivecomputations/dolphin-2.9.2-qwen2-7b",
  "NousResearch/Nous-Hermes-2-Mistral-7B-DPO",
  "mistralai/Mistral-7B-Instruct-v0.3",
  "teknium/OpenHermes-2.5-Mistral-7B"
];

let currentModelIndex = 0;
let isGenerating = false;

// ===== STATE =====
let chats = JSON.parse(localStorage.getItem("worm-aiva-chats") || "{}");
let currentChatId = null;
let messages = [];

// ===== INIT =====
renderHistory();
newChat();

// ===== CHAT MANAGEMENT =====
function genId() { return "chat-" + Date.now() + "-" + Math.random().toString(36).slice(2,7); }

function newChat() {
  currentChatId = genId();
  messages = [];
  showWelcome();
  renderHistory();
  closeSidebar();
}

function loadChat(id) {
  currentChatId = id;
  messages = chats[id]?.messages || [];
  renderHistory();
  renderMessages();
  closeSidebar();
}

function saveCurrentChat() {
  if (!currentChatId) return;
  const firstMsg = messages.find(m => m.role === "user");
  const title = firstMsg ? firstMsg.content.slice(0, 42) + (firstMsg.content.length > 42 ? "..." : "") : "Chat baru";
  chats[currentChatId] = { title, messages, ts: Date.now() };
  localStorage.setItem("worm-aiva-chats", JSON.stringify(chats));
  renderHistory();
}

function deleteChat(id, e) {
  e.stopPropagation();
  delete chats[id];
  localStorage.setItem("worm-aiva-chats", JSON.stringify(chats));
  if (currentChatId === id) newChat();
  else renderHistory();
}

function clearAllHistory() {
  if (!confirm("Hapus semua riwayat chat?")) return;
  chats = {};
  localStorage.setItem("worm-aiva-chats", JSON.stringify(chats));
  newChat();
}

function renderHistory() {
  const list = document.getElementById("history-list");
  const sorted = Object.entries(chats).sort((a,b) => (b[1].ts||0) - (a[1].ts||0));
  if (sorted.length === 0) {
    list.innerHTML = '<div style="padding:14px 10px;font-size:12px;color:var(--text-faint);text-align:center;">Belum ada riwayat chat</div>';
    return;
  }
  list.innerHTML = sorted.map(([id, data]) => `
    <div class="hist-item ${id === currentChatId ? 'active' : ''}" onclick="loadChat('${id}')">
      <span class="hist-title">${escHtml(data.title || "Chat")}</span>
      <button class="hist-del" onclick="deleteChat('${id}', event)" title="Hapus">x</button>
    </div>
  `).join("");
}

// ===== UI =====
function showWelcome() {
  const area = document.getElementById("chat-area");
  area.innerHTML = `
    <div id="welcome">
      <img class="welcome-logo" src="https://i.ibb.co.com/T5JkfpS/file-00000000329c71fa9276e0523e9d3280.png" alt="Worm Aiva" />
      <div class="welcome-name">WORM AIVA</div>
      <div class="welcome-sub">Tanyakan apa saja, saya siap membantu sepenuhnya.</div>
      <div class="suggestions">
        <button class="sugg-btn" onclick="useSuggestion('Apa itu AI?')">Apa itu AI?</button>
        <button class="sugg-btn" onclick="useSuggestion('Bantu saya coding Python')">Bantu coding Python</button>
        <button class="sugg-btn" onclick="useSuggestion('Tulis email profesional')">Tulis email</button>
        <button class="sugg-btn" onclick="useSuggestion('Jelaskan machine learning')">Machine learning</button>
        <button class="sugg-btn" onclick="useSuggestion('Buat fungsi sorting di JavaScript')">Buat fungsi sort JS</button>
        <button class="sugg-btn" onclick="useSuggestion('Jelaskan cara kerja neural network secara mendalam')">Neural network</button>
      </div>
    </div>
  `;
}

function renderMessages() {
  const area = document.getElementById("chat-area");
  if (messages.length === 0) { showWelcome(); return; }
  area.innerHTML = messages.map((m, i) => renderMsg(m, i)).join("");
  scrollBottom();
}

function renderMsg(m, idx) {
  const isUser = m.role === "user";
  const contentHtml = isUser ? escHtml(m.content).replace(/\n/g,"<br>") : formatAI(m.content);
  const avatarHtml = isUser
    ? `<div class="avatar avatar-user">U</div>`
    : `<div class="avatar"><img src="https://i.ibb.co.com/T5JkfpS/file-00000000329c71fa9276e0523e9d3280.png" /></div>`;

  return `
    <div class="msg ${isUser ? 'user' : 'ai'}">
      ${avatarHtml}
      <div class="bubble">${contentHtml}</div>
    </div>
  `;
}

function appendMsg(role, content) {
  const area = document.getElementById("chat-area");
  const welcome = document.getElementById("welcome");
  if (welcome) welcome.remove();

  const idx = messages.length;
  const isUser = role === "user";
  const contentHtml = isUser ? escHtml(content).replace(/\n/g,"<br>") : formatAI(content);
  const avatarHtml = isUser
    ? `<div class="avatar avatar-user">U</div>`
    : `<div class="avatar"><img src="https://i.ibb.co.com/T5JkfpS/file-00000000329c71fa9276e0523e9d3280.png" /></div>`;

  const div = document.createElement("div");
  div.className = "msg " + (isUser ? "user" : "ai");
  div.id = "msg-" + idx;
  div.innerHTML = `${avatarHtml}<div class="bubble">${contentHtml}</div>`;
  area.appendChild(div);
  scrollBottom();
  return div;
}

function appendThinking() {
  const area = document.getElementById("chat-area");
  const welcome = document.getElementById("welcome");
  if (welcome) welcome.remove();

  const div = document.createElement("div");
  div.className = "msg ai";
  div.id = "thinking-bubble";
  div.innerHTML = `
    <div class="avatar"><img src="https://i.ibb.co.com/T5JkfpS/file-00000000329c71fa9276e0523e9d3280.png" /></div>
    <div class="bubble">
      <div class="thinking">
        <div class="dots"><span></span><span></span><span></span></div>
        Sedang berpikir...
      </div>
    </div>
  `;
  area.appendChild(div);
  scrollBottom();
  return div;
}

function scrollBottom() {
  const area = document.getElementById("chat-area");
  area.scrollTop = area.scrollHeight;
}

// ===== SEND =====
async function sendMessage() {
  if (isGenerating) return;
  const input = document.getElementById("msg-input");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";
  input.style.height = "22px";

  messages.push({ role: "user", content: text });
  appendMsg("user", text);
  saveCurrentChat();

  const thinkDiv = appendThinking();
  setGenerating(true);

  let response = null;
  let usedModelIndex = currentModelIndex;

  // Try models in order if rate limit
  for (let attempt = 0; attempt < MODELS.length; attempt++) {
    const modelIdx = (usedModelIndex + attempt) % MODELS.length;
    const model = MODELS[modelIdx];
    updateModelDisplay(model);

    try {
      const res = await fetch(FEATHERLESS_API, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${API_KEY}`
        },
        body: JSON.stringify({
          model: model,
          messages: [
            {
              role: "system",
              content: "Kamu adalah Worm Aiva, asisten AI yang cerdas, jujur, dan membantu. Kamu selalu memberikan jawaban yang lengkap, mendalam, dan menyeluruh - tidak pernah setengah-setengah. Ketika menjelaskan sesuatu, kamu memastikan penjelasanmu komprehensif dan mudah dipahami. Ketika membantu coding, kamu selalu menyertakan kode yang lengkap dan penjelasan yang detail. Kamu tidak menggunakan emoji."
            },
            ...messages
          ],
          max_tokens: 4096,
          temperature: 0.7
        })
      });

      if (res.status === 429 || res.status === 503) {
        // Rate limit - try next model
        console.log(`Model ${model} rate limited, trying next...`);
        continue;
      }

      if (!res.ok) {
        const err = await res.text();
        throw new Error(`API Error ${res.status}: ${err}`);
      }

      response = await res.json();
      currentModelIndex = modelIdx;
      updateModelDisplay(MODELS[modelIdx]);
      break;

    } catch(err) {
      if (attempt === MODELS.length - 1) {
        thinkDiv.remove();
        messages.push({ role: "assistant", content: "Maaf, terjadi kesalahan saat menghubungi API. Pastikan API key Featherless sudah dikonfigurasi dengan benar di kode." });
        appendMsg("ai", messages[messages.length-1].content);
        saveCurrentChat();
        setGenerating(false);
        return;
      }
    }
  }

  thinkDiv.remove();

  if (response) {
    const aiText = response.choices?.[0]?.message?.content || "Maaf, tidak ada respons dari model.";
    messages.push({ role: "assistant", content: aiText });
    appendMsg("ai", aiText);
    saveCurrentChat();
  }

  setGenerating(false);
}

function setGenerating(val) {
  isGenerating = val;
  const btn = document.getElementById("send-btn");
  btn.disabled = val;
}

function updateModelDisplay(model) {
  const shortName = model.includes("/") ? model.split("/")[1] : model;
  document.getElementById("model-display").textContent = shortName.slice(0, 28) + (shortName.length > 28 ? "..." : "");
  document.getElementById("footer-info").textContent = "Model aktif: " + shortName;
}

// ===== FORMATTING =====
function formatAI(text) {
  // Extract code blocks first
  const codeBlocks = [];
  let processed = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (match, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push({ lang: lang || "plaintext", code: code.trim() });
    return `%%CODEBLOCK_${idx}%%`;
  });

  // Escape HTML for non-code parts
  processed = processed.split("%%CODEBLOCK_").map((part, i) => {
    if (i === 0) return escHtmlMarkdown(part);
    const end = part.indexOf("%%");
    const idx = parseInt(part.slice(0, end));
    const rest = escHtmlMarkdown(part.slice(end + 2));
    return renderCodeBlock(codeBlocks[idx].lang, codeBlocks[idx].code) + rest;
  }).join("");

  return processed;
}

function escHtmlMarkdown(str) {
  // Escape HTML
  let s = str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  // Headers
  s = s.replace(/^### (.+)$/gm, "<h3>$1</h3>");
  s = s.replace(/^## (.+)$/gm, "<h2>$1</h2>");
  s = s.replace(/^# (.+)$/gm, "<h1>$1</h1>");

  // Bold and italic
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>");
  s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/\*(.+?)\*/g, "<em>$1</em>");

  // Inline code
  s = s.replace(/`([^`]+)`/g, "<code>$1</code>");

  // Links
  s = s.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');

  // Lists
  s = s.replace(/^[-*+] (.+)$/gm, "<li>$1</li>");
  s = s.replace(/^(\d+)\. (.+)$/gm, "<li>$2</li>");
  s = s.replace(/(<li>[\s\S]+?<\/li>)/g, "<ul>$1</ul>");

  // Paragraphs
  s = s.split(/\n\n+/).map(p => {
    p = p.trim();
    if (!p) return "";
    if (p.startsWith("<h") || p.startsWith("<ul") || p.startsWith("<ol")) return p;
    return "<p>" + p.replace(/\n/g, "<br>") + "</p>";
  }).filter(Boolean).join("\n");

  return s;
}

function renderCodeBlock(lang, code) {
  const id = "code-" + Math.random().toString(36).slice(2,8);
  const displayLang = lang === "plaintext" ? "TEXT" : lang.toUpperCase();
  const escaped = code.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

  return `
    <div class="code-block-wrapper">
      <div class="code-header">
        <span class="code-lang">${displayLang}</span>
        <div class="code-actions">
          <button class="code-btn" onclick="copyCode('${id}', this)">Salin</button>
          <button class="code-btn" onclick="downloadCode('${id}', '${lang}')">Unduh</button>
        </div>
      </div>
      <div class="code-content" id="${id}">${escaped}</div>
    </div>
  `;
}

function copyCode(id, btn) {
  const el = document.getElementById(id);
  const text = el.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "Disalin!";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.textContent = "Salin";
      btn.classList.remove("copied");
    }, 1800);
  });
}

function downloadCode(id, lang) {
  const el = document.getElementById(id);
  const text = el.innerText;
  const ext = { python:"py", javascript:"js", typescript:"ts", html:"html", css:"css", java:"java", cpp:"cpp", c:"c", rust:"rs", go:"go", bash:"sh", shell:"sh", sql:"sql", json:"json", yaml:"yaml", xml:"xml" }[lang.toLowerCase()] || "txt";
  const blob = new Blob([text], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "code." + ext;
  a.click();
}

// ===== UTILS =====
function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = "22px";
  el.style.height = Math.min(el.scrollHeight, 160) + "px";
}

function useSuggestion(text) {
  const input = document.getElementById("msg-input");
  input.value = text;
  autoResize(input);
  input.focus();
}

function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}
</script>
